<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Himasree | Full Stack Developer</title>

<style>

html{scroll-behavior:smooth;}

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
}

nav{
background:#020617;
padding:18px;
text-align:center;
position:sticky;
top:0;
z-index:10;
}

nav a{
color:white;
margin:20px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{color:#38bdf8;}

header{
text-align:center;
padding:100px 20px;
background:linear-gradient(180deg,#020617,#0f172a);
}

.profile-img{
width:160px;
border-radius:50%;
border:4px solid #38bdf8;
}

.typing{
color:#38bdf8;
font-weight:bold;
font-size:22px;
}

section{
padding:70px 20px;
max-width:1100px;
margin:auto;
text-align:center;
}

.skills span{
display:inline-block;
background:#1e293b;
padding:10px 16px;
margin:8px;
border-radius:8px;
}

.tech-icons{
margin-top:40px;
}

.tech-icons img{
width:60px;
margin:20px;
transition:0.3s;
}

.tech-icons img:hover{
transform:scale(1.2);
}

.timeline{
border-left:3px solid #38bdf8;
padding-left:20px;
text-align:left;
}

.timeline-item{margin-bottom:30px;}

.projects-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
margin-top:40px;
}

.project-card{
background:#1e293b;
border-radius:12px;
overflow:hidden;
transition:0.3s;
}

.project-card:hover{transform:translateY(-6px);}

.project-card img{
width:100%;
height:200px;
object-fit:cover;
}

.project-content{
padding:20px;
text-align:left;
}

.tech-tag{
display:inline-block;
background:#0f172a;
padding:6px 10px;
margin:5px;
border-radius:6px;
font-size:12px;
}

button{
background:#38bdf8;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
font-size:13px;
margin:8px 5px;
}

button:hover{background:#0ea5e9;}

footer{
background:#020617;
padding:25px;
text-align:center;
margin-top:50px;
}

.social-icons{
position:fixed;
right:20px;
bottom:40px;
display:flex;
flex-direction:column;
gap:10px;
}

.social-icons a{
background:#38bdf8;
color:white;
padding:12px;
border-radius:50%;
text-decoration:none;
font-weight:bold;
}

.fade{
opacity:0;
transform:translateY(20px);
transition:0.6s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

.list-line{margin:8px 0;}

</style>

</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#about">About</a>

<a href="#contact">Contact</a>
</nav>

<header>

<p>
5+ years experience building scalable enterprise applications using
Java, Spring Boot, React and AWS.
</p>

<button>Download Resume</button>

<div class="skills">
<span>Java</span>
<span>Spring Boot</span>
<span>React</span>
<span>AWS</span>
<span>Docker</span>
<span>Kubernetes</span>
<span>MySQL</span>
<span>MongoDB</span>
</div>

<div class="tech-icons">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/java/java-original.svg">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/spring/spring-original.svg">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/docker/docker-original.svg">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/kubernetes/kubernetes-plain.svg">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mysql/mysql-original.svg">
